# CI pipeline — runs on every push and pull_request across all branches.
# Three jobs run in parallel: backend lint/test, frontend lint/build, docker build.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Restrict GITHUB_TOKEN to the minimum permissions required by this workflow.
# No deployments or writes are performed here — read access to the repo is sufficient.
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # A. Backend: ruff lint, bandit SAST, safety dependency audit, pytest
  # ────────────────────────────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend — lint / test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: back/requirements.txt

      # Install production deps + all dev/test tooling in one layer
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety pytest anyio[trio] pytest-asyncio httpx

      # ruff: fast linter — select only actionable rule sets; ignore E501 (line-length)
      - name: Ruff lint
        run: ruff check . --select E,F,W,I,S --ignore E501

      # bandit: SAST for Python — skip data/ (parquet files, not source); -ll = skip LOW severity
      - name: Bandit security scan
        run: bandit -r . -ll -x ./data/ --exit-zero

      # safety: check known CVEs in pinned deps — warn only, don't block the build
      - name: Safety dependency audit
        run: safety check -r requirements.txt --continue-on-error || true

      # Run smoke tests; if no test files exist the find exits 1 and we skip gracefully
      - name: Run pytest
        run: |
          if find . -name "test_*.py" | grep -q .; then
            pytest . -v --tb=short -x
          else
            echo "No test files found — skipping pytest"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # B. Frontend: eslint, TypeScript type-check, Next.js production build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — lint / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front_finops

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_finops/package-lock.json

      # npm ci is faster and deterministic compared to npm install
      - name: Install dependencies
        run: npm ci

      # ESLint — eslint binary is invoked via the npm lint script
      - name: ESLint
        run: npm run lint

      # TypeScript type-check without emitting files
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Next.js build — requires NEXT_PUBLIC_API_URL at build time
      - name: Next.js production build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # C. Docker: build the backend image and run a fast import smoke test
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — build & smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Build the multi-stage Dockerfile; tag locally for testing only
      - name: Build Docker image
        run: docker build -t finops-backend:test ./back

      # Smoke test: verify FastAPI and core imports load correctly inside the image.
      # We do NOT import main directly because the lifespan event tries to read parquet files.
      # Testing that the framework and dependencies are present is sufficient here.
      - name: Docker import smoke test
        run: |
          docker run --rm finops-backend:test python -c "
          from fastapi import FastAPI
          from pydantic import BaseModel
          from core.config import get_settings
          from core.errors import AppError
          print('OK — all core imports succeeded')
          "
