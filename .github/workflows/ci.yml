# CI pipeline — runs on pushes to main/dev and on every pull_request.
# (push limited to main/dev to avoid double runs on PR branches.)
# Five jobs run in parallel, one per deliverable of the repo:
#   backend lint/test (+ coverage floor), frontend lint/build/unit-tests,
#   docker build + prod-config boot smoke, terraform fmt/validate,
#   shellcheck on the deploy scripts.
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ["**"]

# Restrict GITHUB_TOKEN to the minimum permissions required by this workflow.
# No deployments or writes are performed here — read access to the repo is sufficient.
permissions:
  contents: read

# A superseded run (new push on the same branch/PR) is cancelled instead of
# burning runner minutes to completion.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # A. Backend: install deps, run pytest (unit + calculation-correctness tests)
  # ────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      # SEC-036: third-party actions pinned to full commit SHA. A moving @v4
      # tag lets a compromised publisher inject code with GITHUB_TOKEN access
      # into every run (see tj-actions/changed-files, March 2025). SHAs make
      # the exact bytes we execute reviewable; Dependabot bumps handle drift.
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: back/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test/lint-only deps: keep them out of requirements.txt so the runtime
          # image stays lean, but install them here for the CI job.
          pip install pytest pytest-asyncio pytest-cov ruff

      # Style + likely-bug lint (config in back/pyproject.toml).
      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # Correctness tests + smoke tests. Loaders are monkeypatched so the tests
      # do not depend on the bundled demo parquet files (tracked in back/data/).
      # Coverage floor: measured at 61% when introduced — the 55% gate is a
      # ratchet against silent erosion, not a target. Raise it as coverage
      # grows; never lower it to make a PR green.
      - name: Run pytest (with coverage floor)
        run: pytest -v --tb=short --cov=. --cov-report=term --cov-fail-under=55

  # ────────────────────────────────────────────────────────────────────────────
  # B. Frontend: eslint, TypeScript type-check, Next.js production build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — lint / build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: front_finops

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_finops/package-lock.json

      # npm ci is faster and deterministic compared to npm install
      - name: Install dependencies
        run: npm ci

      # ESLint — eslint binary is invoked via the npm lint script
      - name: ESLint
        run: npm run lint

      # TypeScript type-check without emitting files
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Unit tests (vitest) — currently the contract tests on the snake_case →
      # camelCase transformer (lib/api.ts), the most fragile piece of the data
      # layer: a regression there silently corrupts every dashboard lookup.
      - name: Unit tests (vitest)
        run: npm test

      # Next.js build — requires NEXT_PUBLIC_API_URL at build time
      - name: Next.js production build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # C. Docker: build the backend image and run a fast import smoke test
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — build & smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Build the multi-stage Dockerfile; tag locally for testing only
      - name: Build Docker image
        run: docker build -t finops-backend:test ./back

      # Smoke test: verify FastAPI and core imports load correctly inside the image.
      # We do NOT import main directly because the lifespan event tries to read parquet files.
      # Testing that the framework and dependencies are present is sufficient here.
      - name: Docker import smoke test
        run: |
          docker run --rm finops-backend:test python -c "
          from fastapi import FastAPI
          from pydantic import BaseModel
          from core.config import get_settings
          from core.errors import AppError
          print('OK — all core imports succeeded')
          "

      # Boot the image in PRODUCTION configuration and require /health to
      # answer 200. Catches the "cannot even start in prod" class of
      # regressions (fail-fast env checks: CORS wildcard, missing API_KEY or
      # SESSION_SECRET) that the import smoke above cannot see — this exact
      # gap once shipped a prod config that crash-looped at boot.
      # DATA_ALLOW_PARQUET_FALLBACK=false keeps the startup precompute short
      # (tasks fail fast on the empty store; the lifespan tolerates that).
      - name: Prod-config boot smoke test
        run: |
          docker run -d --name prod-smoke -p 8080:8080 \
            -e ENV=prod \
            -e API_KEY=ci-smoke-api-key \
            -e SESSION_SECRET=ci-smoke-session-secret-0123456789abcdef \
            -e CORS_ORIGINS=https://ci-smoke.example.com \
            -e DATA_ALLOW_PARQUET_FALLBACK=false \
            -e AWS_DEFAULT_REGION=eu-west-1 \
            finops-backend:test
          ok=0
          for _ in $(seq 1 45); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          echo "── container logs ──"
          docker logs prod-smoke
          docker rm -f prod-smoke > /dev/null
          if [ "$ok" != "1" ]; then
            echo "::error::backend failed to serve /health within 90s in prod configuration"
            exit 1
          fi
          echo "OK — backend boots and serves /health in prod configuration"

      # SEC-031 (I-H3): fail the build on any HIGH or CRITICAL vulnerability
      # in the built image. Blocks known-CVE deploys from ever reaching ECR.
      # ``ignore-unfixed`` avoids noise from advisories with no available fix.
      # SEC-036: pinned to full commit SHA (was a mutable version tag).
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.24.0
        with:
          image-ref: finops-backend:test
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os,library

  # ────────────────────────────────────────────────────────────────────────────
  # D. Terraform: formatting + static validation of the AWS infra definition.
  # ``-backend=false`` skips the S3 state backend, so no AWS credentials are
  # needed — this validates syntax, provider schemas and references only.
  # ────────────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform — fmt / validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # SEC-036: pinned to full commit SHA. Version matches the one the infra
      # was last validated with locally.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive -diff

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  # ────────────────────────────────────────────────────────────────────────────
  # E. Shell scripts: shellcheck on the deploy tooling. deploy.sh performs the
  # production rollout (ECR push, App Runner update, rollback) — a quoting bug
  # there is a production incident, not a style issue. shellcheck ships
  # preinstalled on ubuntu-latest runners.
  # ────────────────────────────────────────────────────────────────────────────
  shell-lint:
    name: Shell — shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: shellcheck deploy scripts
        run: shellcheck --severity=warning deploy.sh terraform/bootstrap-backend.sh
