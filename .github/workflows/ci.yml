# CI pipeline — runs on pushes to main/dev and on every pull_request.
# (push limited to main/dev to avoid double runs on PR branches.)
# Three jobs run in parallel: backend lint/test, frontend lint/build, docker build.
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ["**"]

# Restrict GITHUB_TOKEN to the minimum permissions required by this workflow.
# No deployments or writes are performed here — read access to the repo is sufficient.
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # A. Backend: install deps, run pytest (unit + calculation-correctness tests)
  # ────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: back/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test-only deps: keep them out of requirements.txt so the runtime
          # image stays lean, but install them here for the test job.
          pip install pytest pytest-asyncio

      # Correctness tests + smoke tests. Loaders are monkeypatched so the tests
      # do not depend on the bundled demo parquet files (tracked in back/data/).
      - name: Run pytest
        run: pytest -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # B. Frontend: eslint, TypeScript type-check, Next.js production build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — lint / build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: front_finops

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_finops/package-lock.json

      # npm ci is faster and deterministic compared to npm install
      - name: Install dependencies
        run: npm ci

      # ESLint — eslint binary is invoked via the npm lint script
      - name: ESLint
        run: npm run lint

      # TypeScript type-check without emitting files
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Next.js build — requires NEXT_PUBLIC_API_URL at build time
      - name: Next.js production build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # C. Docker: build the backend image and run a fast import smoke test
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — build & smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Build the multi-stage Dockerfile; tag locally for testing only
      - name: Build Docker image
        run: docker build -t finops-backend:test ./back

      # Smoke test: verify FastAPI and core imports load correctly inside the image.
      # We do NOT import main directly because the lifespan event tries to read parquet files.
      # Testing that the framework and dependencies are present is sufficient here.
      - name: Docker import smoke test
        run: |
          docker run --rm finops-backend:test python -c "
          from fastapi import FastAPI
          from pydantic import BaseModel
          from core.config import get_settings
          from core.errors import AppError
          print('OK — all core imports succeeded')
          "
