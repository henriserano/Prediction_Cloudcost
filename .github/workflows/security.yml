# Security scanning pipeline.
# Runs weekly (Monday 08:00 UTC) and on every push to main.
# Three independent jobs: dependency audit, Python SAST, container scan.
name: Security

on:
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  push:
    branches:
      - main

# Restrict GITHUB_TOKEN to the minimum permissions required.
# Scanning jobs only need to read repo contents; they do not write back to GitHub.
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # A. Dependency audit — pip-audit (Python CVEs) + npm audit (JS CVEs)
  # ────────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pip-audit queries the OSV / PyPI advisory databases
      - name: pip-audit (Python dependencies)
        run: |
          pip install --upgrade pip pip-audit
          pip-audit -r back/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # npm audit exits non-zero only for HIGH/CRITICAL findings
      - name: npm audit (JS dependencies)
        working-directory: front_finops
        run: |
          npm ci
          npm audit --audit-level=high

  # ────────────────────────────────────────────────────────────────────────────
  # B. Python SAST — bandit + semgrep
  # ────────────────────────────────────────────────────────────────────────────
  sast-python:
    name: Python SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # bandit: BLOCKING — fails the workflow on any finding not triaged in
      # bandit.yaml (tests excluded, reviewed skips documented in that file).
      # The JSON report is still uploaded as an artifact for review.
      - name: Bandit SAST scan
        run: |
          pip install --upgrade pip bandit
          bandit -c bandit.yaml -r back/ -f json -o bandit-report.json

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

      # semgrep: broader semantic pattern matching; BLOCKING — --error exits
      # non-zero on findings and fails the workflow.
      - name: Semgrep scan
        run: |
          pip install semgrep
          semgrep --config=p/python --config=p/security-audit back/ \
            --error --metrics=off
